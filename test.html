<!DOCTYPE html>
<html>
<head>
    <title>Connect WhatsApp</title>

    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        .btn {
            background-color: #25D366;
            color: white;
            padding: 12px 22px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .status {
            margin-top: 20px;
            font-size: 16px;
            color: #444;
        }
    </style>
</head>

<body>

<h2>Connect your WhatsApp Business Account</h2>

<button class="btn" onclick="launchWhatsAppSignup()">
    Connect WhatsApp
</button>

<div id="status" class="status"></div>

<script>
window.fbAsyncInit = function() {
    FB.init({
        appId      : '1413646157069893',
        cookie     : true,
        xfbml      : true,
        version    : 'v21.0'
    });
};

(function(d, s, id){
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) {return;}
    js = d.createElement(s); js.id = id;
    js.src = "https://connect.facebook.net/en_US/sdk.js";
    fjs.parentNode.insertBefore(js, fjs);
}(document, 'script', 'facebook-jssdk'));

function launchWhatsAppSignup() {

    document.getElementById("status").innerText = "Opening Facebook login...";

    FB.login(function (response) {

        if (response.authResponse) {

            const code = response.authResponse.code;

            document.getElementById("status").innerText = "Starting onboarding process...";

            fetch("https://bharatvarsh-ai-production.up.railway.app/receive-auth-code", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ code: code })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("status").innerText =
                    "✅ Your onboarding process has started. Our representative will guide you further. You can close this page now.";
            })
            .catch(err => {
                document.getElementById("status").innerText =
                    "❌ Something went wrong. Please try again.";
            });

        } else {
            document.getElementById("status").innerText =
                "Login cancelled.";
        }

    }, {
        config_id: '1623515212298214',
        response_type: 'code',
        override_default_response_type: true,
        extras: {
            "featureType": "whatsapp_business_app_onboarding",
            "sessionInfoVersion": "3"
        }
    });
}
</script>

</body>
</html>
