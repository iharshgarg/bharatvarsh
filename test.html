<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WhatsApp API Test - Bharatvarsh AI</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#070707;
color:#fff;
text-align:center;
padding-top:100px;
}

.container{
width:400px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

button{
padding:14px 25px;
font-size:16px;
background:#25D366;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#status{
margin-top:20px;
color:#d6b25e;
}

</style>
</head>

<body>

<div class="container">

<h2>WhatsApp Cloud API Test</h2>

<p>Enter your Access Token</p>

<input id="token" placeholder="Paste Access Token here">

<button onclick="sendMessage()">Send WhatsApp Message</button>

<p id="status"></p>

</div>

<script>

async function sendMessage(){

const token = document.getElementById("token").value;

if(!token){
alert("Please enter access token");
return;
}

document.getElementById("status").innerText="Sending message...";

const response = await fetch(
"https://graph.facebook.com/v22.0/994937067040308/messages",
{
method:"POST",
headers:{
"Authorization":"Bearer " + token,
"Content-Type":"application/json"
},
body:JSON.stringify({
messaging_product:"whatsapp",
to:"917778000836",
type:"template",
template:{
name:"hello_world",
language:{code:"en_US"}
}
})
});

const data = await response.json();

document.getElementById("status").innerText="Message sent! Check WhatsApp.";

console.log(data);

}

</script>

</body>
</html>
