<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Signup</title>
</head>
<body>
    <h2>Connect your WhatsApp Business Account</h2>
    <button onclick="launchWhatsAppSignup()" style="background-color: #25D366; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
        Login with Facebook
    </button>

    <script>
        // Initialize the Facebook SDK
        window.fbAsyncInit = function() {
            FB.init({
                appId      : '1413646157069893', // Your App ID
                cookie     : true,
                xfbml      : true,
                version    : 'v21.0'
            });
        };

        // Load the SDK script
        (function(d, s, id){
            var js, fjs = d.getElementsByTagName(s)[0];
            if (d.getElementById(id)) {return;}
            js = d.createElement(s); js.id = id;
            js.src = "https://connect.facebook.net/en_US/sdk.js";
            fjs.parentNode.insertBefore(js, fjs);
        }(document, 'script', 'facebook-jssdk'));

        function launchWhatsAppSignup() {
            FB.login(function (response) {
                if (response.authResponse) {
                    // *** THIS IS THE AUTHORIZATION CODE YOU ARE LOOKING FOR ***
                    const code = response.authResponse.code;
                    
                    console.log("Found the Code:", code);
                    alert("Authorization Code Received: " + code);

                    // Step 3: Send this 'code' to your server via an API call
                    // fetch('/your-backend-api', { method: 'POST', body: JSON.stringify({ code: code }) });
                    
                } else {
                    console.log('User cancelled or did not fully authorize.');
                }
            }, {
                config_id: '1623515212298214', // Your Configuration ID
                response_type: 'code',        // Mandatory to get the 'code'
                override_default_response_type: true,
                extras: {
                    "featureType": "whatsapp_business_app_onboarding",
                    "sessionInfoVersion": "3"
                }
            });
        }
    </script>
</body>
</html>
